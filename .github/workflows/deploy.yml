name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build the app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fetch gh-pages if it exists (ignore error if first deploy)
          git fetch origin gh-pages || true
          # Switch to gh-pages, resetting it to the remote (or orphan on first run)
          git checkout -B gh-pages origin/gh-pages 2>/dev/null || git checkout --orphan gh-pages
          # Remove all tracked files (dist/ is untracked so it survives the rm)
          git rm -rf . --quiet 2>/dev/null || true
          # Copy built output into the workspace root
          cp -r dist/. .
          rm -rf dist node_modules
          git add -A
          git commit -m "deploy: ${{ github.sha }}" --allow-empty
          git push origin gh-pages --force
