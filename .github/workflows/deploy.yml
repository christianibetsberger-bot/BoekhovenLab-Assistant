name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build the app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.DEPLOY_PAT }}@github.com/${{ github.repository }}.git"
          git fetch origin gh-pages || true
          git checkout -B gh-pages origin/gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf . --quiet 2>/dev/null || true
          cp -r dist/. .
          rm -rf dist node_modules
          git add -A
          git commit -m "deploy: ${{ github.sha }}" --allow-empty
          git push origin gh-pages --force
