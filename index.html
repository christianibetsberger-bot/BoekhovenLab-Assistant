<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoekhovenLab Assistant</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            /* Dynamic Variables - Overridden by Vue */
            --primary: #0E396E;      
            --bg: #f4f7f5;            
            --surface: #ffffff;
            --text: #1f2937; 
            --border: #d1d5db;
            --danger: #ef4444; 
            --danger-bg: #fee2e2;
            --success: #10b981; 
            --summary-bg: #f8fafc;
            --input-bg: #ffffff;
            --panel-bg: #f9fafb;
            --radius: 2px; /* Controlled by UI settings */
        }

        /* Dark Mode Override */
        body.dark-mode {
            --bg: #111827;            
            --surface: #1f2937;
            --text: #f3f4f6; 
            --border: #374151;
            --danger: #f87171; 
            --danger-bg: #7f1d1d;
            --summary-bg: #111827;
            --input-bg: #374151;
            --panel-bg: #1f2937;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.5; transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden; /* Extra safety to prevent page-level horizontal scrolling */
        }
        
        .container {
            max-width: 1700px; 
            width: 100%;
            margin: 0 auto; 
            display: grid; 
            /* THE FIX: minmax(0, 1fr) allows the column to shrink below content width! */
            grid-template-columns: minmax(350px, 480px) minmax(0, 1fr); 
            gap: 25px; 
            align-items: start;
        }
        
        /* Lab Journal spans full width at top */
        .full-width-header { grid-column: 1 / -1; }

        .card {
            background-color: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 25px; border: 1px solid var(--border); border-top: 4px solid var(--primary); transition: background-color 0.3s, border-radius 0.3s;
        }
        
        h2 { margin-top: 0; font-size: 1.25rem; border-bottom: 2px solid var(--bg); padding-bottom: 12px; color: var(--primary); display: flex; align-items: center; gap: 10px; font-weight: 700; }
        h3 { margin-top: 0; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; color: var(--text); font-weight: 600; }
        h4 { margin-top: 0; font-size: 0.95rem; color: var(--text); opacity: 0.8; margin-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="number"], input[type="text"], input[type="date"], select, textarea {
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius); box-sizing: border-box; font-family: inherit; transition: border-color 0.2s, border-radius 0.3s; background-color: var(--input-bg); color: var(--text); appearance: none; -webkit-appearance: none; box-shadow: none !important;
        }
        select { background-image: url('data:image/svg+xml;utf8,<svg fill="%23999" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>'); background-repeat: no-repeat; background-position-x: 98%; background-position-y: 50%; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); }
        input[type="color"] { padding: 2px; height: 40px; cursor: pointer; }
        
        .input-with-select { display: flex; }
        .input-with-select input { border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0; }
        .input-with-select select { width: 90px; font-weight: 600; border-left: 1px solid var(--border); border-top-left-radius: 0; border-bottom-left-radius: 0; }
        
        button {
            background-color: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: var(--radius); cursor: pointer; font-weight: 600; transition: filter 0.2s, border-radius 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: none; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px;
        }
        button:hover { filter: brightness(0.85); }
        button.small { padding: 6px 10px; font-size: 0.75rem; }
        button.danger { background-color: var(--danger); }
        button.success { background-color: var(--success); }
        button.secondary { background-color: #6b7280; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 0.85rem; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; background-color: var(--input-bg); opacity: 0.9; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.75rem; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; user-select: none; }
        
        .summary-panel { background-color: var(--summary-bg); padding: 15px; border-radius: var(--radius); margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border: 1px solid var(--border); }
        .summary-panel.error { background-color: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
        .summary-box { background: var(--surface); padding: 12px; border-radius: var(--radius); text-align: center; border: 1px solid var(--border); }
        .summary-box strong { display: block; font-size: 1.2rem; color: var(--primary); margin-top: 4px; }
        
        .matrix-table th, .matrix-table td { text-align: center; vertical-align: top; border: 1px solid var(--border); }
        .matrix-cell { background: var(--input-bg); padding: 12px; font-size: 0.85rem; text-align: left; line-height: 1.5; border-left: 3px solid var(--primary); }
        .matrix-cell strong { color: var(--primary); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .icon-muted { opacity: 0.5; }
        
        .search-box { position: relative; margin-bottom: 15px; }
        .search-box i { position: absolute; left: 10px; top: 12px; opacity: 0.5; }
        .search-box input { padding-left: 35px; }

        .checkbox-list { max-height: 180px; overflow-y: auto; border: 1px solid var(--border); padding: 10px; background: var(--input-bg); border-radius: var(--radius); }
        .checkbox-list label { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; font-weight: normal; font-size: 0.85rem; }
        .checkbox-list input[type="checkbox"] { width: auto; appearance: auto; -webkit-appearance: auto; }

        .journal-container { display: flex; height: 500px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .journal-sidebar { width: 260px; background: var(--panel-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .journal-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .journal-item { padding: 12px; border-radius: var(--radius); cursor: pointer; margin-bottom: 8px; border: 1px solid transparent; transition: all 0.2s; background: var(--surface); }
        .journal-item:hover { border-color: var(--border); }
        .journal-item.active { border-left: 4px solid var(--primary); background: var(--summary-bg); }
        .journal-item-title { font-weight: bold; font-size: 0.95rem; }
        .journal-item-date { font-size: 0.8rem; opacity: 0.7; margin-top: 4px; }
        .journal-editor { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; background: var(--surface); min-width: 0; /* allows flex children to shrink */ }
        .journal-editor-header { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .journal-textarea { flex-grow: 1; resize: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 0.95rem; line-height: 1.6; padding: 15px; border: 1px solid var(--border); border-radius: var(--radius); white-space: pre-wrap; width: 100%; }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* --- Rich Text Editor Styles --- */
        .rtf-toolbar {
            background: var(--summary-bg); border-bottom: 1px solid var(--border); padding: 8px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
        }
        .rtf-btn {
            background: var(--input-bg); color: var(--text); border: 1px solid var(--border); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); cursor: pointer; transition: all 0.2s; padding: 0; box-shadow: none; font-size: 0.9rem;
        }
        .rtf-btn:hover {
            background: var(--primary); color: white; border-color: var(--primary); filter: none;
        }
        .rtf-editor:empty:before {
            content: attr(placeholder);
            color: var(--text);
            opacity: 0.5;
            pointer-events: none;
            display: block;
        }
        .inv-ref {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background-color: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            margin: 0 4px;
            user-select: none;
            vertical-align: middle;
            line-height: 1.2;
        }

        /* --- Well Plate Styles --- */
        .plate-container { overflow-x: auto; background: var(--panel-bg); padding: 15px; border-radius: var(--radius); border: 1px solid var(--border); }
        .plate-grid { display: grid; gap: 4px; margin-top: 10px; }
        .well { background: var(--surface); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; cursor: pointer; user-select: none; aspect-ratio: 1; transition: all 0.1s; color: transparent; position: relative; }
        .well:hover { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
        .well.has-content { background: var(--summary-bg); border-color: var(--primary); color: var(--primary); }
        .well.has-content::after { content: ''; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; }
        .well.selected { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--primary); }
        .well.selected.has-content::after { background: white; }
        .plate-label { display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.75rem; opacity: 0.7; }
        .well-editor-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 15px; overflow: hidden; }

        @media (max-width: 1200px) {
            /* Stacks the main interface vertically */
            .container {
                grid-template-columns: 1fr; 
            }
            
            /* Adjusts the journal to stack nicely instead of getting squished */
            .journal-container {
                flex-direction: column;
                height: auto;
                min-height: 500px;
            }

            .journal-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 250px;
            }

            /* Stacks internal two-column inputs safely */
            .grid-2 {
                grid-template-columns: 1fr; 
            }
        }
    </style>
</head>
<body id="body-wrapper">

<div id="app" class="container">

    <div v-if="!user" class="card full-width-header" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h2 style="justify-content: center;"><i class="fas fa-lock"></i> Lab Login</h2>
        <p style="font-size: 0.85rem; opacity: 0.8;">Sign in to access your inventory.</p>
        <div class="input-group">
            <input type="email" v-model="authEmail" placeholder="Email Address">
        </div>
        <div class="input-group">
            <input type="password" v-model="authPassword" placeholder="Password">
        </div>
        <button @click="signUp" class="secondary" style="width: 100%; margin-bottom: 10px;">Create Account</button>
        <button @click="signIn" style="width: 100%;">Log In</button>
    </div>

    <template v-else>
        <div class="full-width-header" style="text-align: right; margin-bottom: 15px; grid-column: 1 / -1;">
            <span style="opacity: 0.8; font-size: 0.9rem; margin-right: 10px;">Logged in as: <strong>{{ user.email }}</strong></span>
            <button class="small danger" @click="signOut"><i class="fas fa-sign-out-alt"></i> Log Out</button>
        </div>

        <div v-if="viewingItem" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
            <div style="background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); max-width: 500px; width: 90%;">
                
                <template v-if="viewingItem.itemClass === 'DNA' || viewingItem.itemClass === 'RNA'">
                    <h3 style="margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px;"><i class="fas fa-dna"></i> Sequence Properties</h3>
                    
                    <div class="grid-2" style="margin-top: 15px;">
                        <p style="margin: 0;"><strong>Name:</strong> {{ viewingItem.name }}</p>
                        <div class="input-group" style="margin: 0;">
                            <label style="font-size: 0.6rem;">Type</label>
                            <select v-model="viewingItem.oligoType" @change="updateManualSequence(viewingItem)" style="padding: 4px;">
                                <option value="DNA">DNA</option>
                                <option value="RNA">RNA</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="input-group" style="margin-top: 15px;">
                        <label>Manual Sequence (5' to 3')</label>
                        <textarea v-model="viewingItem.sequence" rows="3" @input="updateManualSequence(viewingItem)" placeholder="Paste sequence (ATGC...) or [Mod]ATGC..."></textarea>
                    </div>

                    <div class="input-group">
                        <label>Manual Mass/Mw (Da)</label>
                        <input type="number" v-model.number="viewingItem.manualMw" @input="updateManualSequence(viewingItem)" step="any" placeholder="Optional override">
                    </div>
                    
                    <div class="grid-2" style="background: var(--panel-bg); padding: 15px; border-radius: var(--radius); border: 1px solid var(--border);">
                        <div><strong>Length:</strong> {{ viewingItem.length || 0 }} nt</div>
                        <div><strong>GC%:</strong> {{ formatNum(viewingItem.gc || 0) }}%</div>
                        <div><strong>Mw:</strong> {{ formatNum(viewingItem.mw || 0) }} Da <span v-if="viewingItem.manualMw" style="color: var(--primary); font-size: 0.75rem;">(Manual)</span></div>
                        <div><strong>Ext. Coeff:</strong> {{ formatNum(viewingItem.extinction || 0) }}</div>
                        <div><strong>Tm:</strong> {{ formatNum(viewingItem.tm || 0) }} °C</div>
                    </div>
                </template>

                <template v-else>
                    <h3 style="margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--bg); padding-bottom: 10px;"><i class="fas fa-flask"></i> Chemical Properties</h3>
                    
                    <div class="grid-2" style="margin-top: 15px;">
                        <p style="margin: 0;"><strong>Name:</strong> {{ viewingItem.name }}</p>
                        <p style="margin: 0;"><strong>Code:</strong> {{ viewingItem.code }}</p>
                    </div>

                    <div class="grid-2" style="background: var(--panel-bg); padding: 15px; border-radius: var(--radius); border: 1px solid var(--border); margin-top: 15px;">
                        <div><strong>Sub-location:</strong><br> <input type="text" v-model="viewingItem.sublocation" placeholder="e.g. Box 2" style="padding: 4px; margin-top: 4px; width: 100%;"></div>
                        <div><strong>Catalog Number:</strong><br> <input type="text" v-model="viewingItem.catalogNum" placeholder="e.g. C1234" style="padding: 4px; margin-top: 4px; width: 100%;"></div>
                        <div><strong>Unit Size:</strong><br> <input type="text" v-model="viewingItem.unitSize" placeholder="e.g. 500g" style="padding: 4px; margin-top: 4px; width: 100%;"></div>
                        <div><strong>CAS Number:</strong><br> <input type="text" v-model="viewingItem.cas" placeholder="e.g. 50-00-0" style="padding: 4px; margin-top: 4px; width: 100%;"></div>
                    </div>
                </template>
                
                <button @click="viewingItem = null" style="margin-top: 20px; width: 100%;">Save & Close</button>
            </div>
        </div>

        <div class="card full-width-header">
            <div class="flex-between" style="border-bottom: 2px solid var(--bg); padding-bottom: 12px; margin-bottom: 20px; display: flex; justify-content: space-between;">
                <h2 style="border: none; padding: 0; margin: 0;"><i class="fas fa-book"></i> Lab Journal</h2>
                <button @click="addJournalEntry" class="small"><i class="fas fa-file-circle-plus"></i> New Entry</button>
            </div>

            <div class="journal-container" v-if="journal.entries.length > 0">
                <div class="journal-sidebar">
                    <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; opacity: 0.8; text-transform: uppercase; font-size: 0.85rem;">
                        Logged Experiments
                    </div>
                    <div class="journal-list">
                        <div v-for="entry in sortedJournalEntries" :key="entry.id" 
                             :class="['journal-item', { active: journal.activeId === entry.id }]"
                             @click="journal.activeId = entry.id">
                            <div class="journal-item-title">{{ entry.expId || 'Untitled Exp' }}</div>
                            <div class="journal-item-date"><i class="far fa-calendar-alt"></i> {{ entry.date }}</div>
                        </div>
                    </div>
                </div>

                <div class="journal-editor" v-if="activeJournalEntry">
                    <div class="journal-editor-header">
                        <div style="flex-grow: 1; min-width: 150px;">
                            <label style="font-weight: bold; font-size: 0.85rem; opacity: 0.7; text-transform: uppercase;">Running No. / Exp ID</label>
                            <input type="text" v-model="activeJournalEntry.expId" placeholder="CTI-114" style="font-size: 1.1rem; font-weight: bold; color: var(--primary); border: none; border-bottom: 2px solid var(--primary); border-radius: 0; background: transparent; padding-left: 0;">
                        </div>
                        <div style="width: 150px;">
                            <label style="font-weight: bold; font-size: 0.85rem; opacity: 0.7; text-transform: uppercase;">Date</label>
                            <input type="date" v-model="activeJournalEntry.date">
                        </div>
                        <div style="display: flex; align-items: flex-end; gap: 8px;">
                            <button class="small" @click="exportJournal('pdf')" title="Export to PDF"><i class="fas fa-file-pdf"></i></button>
                            <button class="small" @click="exportJournal('word')" title="Export to Word"><i class="fas fa-file-word"></i></button>
                            <button class="small" @click="exportJournal('excel')" title="Export to Excel"><i class="fas fa-file-excel"></i></button>
                            <button class="danger small" @click="deleteJournalEntry(activeJournalEntry.id)"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    
                    <label style="font-weight: bold; font-size: 0.85rem; opacity: 0.7; text-transform: uppercase; margin-bottom: 5px;">Documentation Log</label>
                    
                    <div style="display: flex; flex-direction: column; flex-grow: 1; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--input-bg);">
                        <div class="rtf-toolbar">
                            <button class="rtf-btn" @click.prevent="formatDoc('bold')" title="Bold"><i class="fas fa-bold"></i></button>
                            <button class="rtf-btn" @click.prevent="formatDoc('italic')" title="Italic"><i class="fas fa-italic"></i></button>
                            <button class="rtf-btn" @click.prevent="formatDoc('underline')" title="Underline"><i class="fas fa-underline"></i></button>
                            <button class="rtf-btn" @click.prevent="formatDoc('strikeThrough')" title="Strikethrough"><i class="fas fa-strikethrough"></i></button>
                            <div style="width: 1px; background: var(--border); margin: 0 4px; height: 24px;"></div>
                            <button class="rtf-btn" @click.prevent="insertDateHeader" title="Insert Date Header"><i class="fas fa-calendar-day"></i></button>
                            <div style="width: 1px; background: var(--border); margin: 0 4px; height: 24px;"></div>
                            <button class="rtf-btn" @click.prevent="formatDoc('insertUnorderedList')" title="Bullet List"><i class="fas fa-list-ul"></i></button>
                            <button class="rtf-btn" @click.prevent="formatDoc('insertOrderedList')" title="Numbered List"><i class="fas fa-list-ol"></i></button>
                            <div style="width: 1px; background: var(--border); margin: 0 4px; height: 24px;"></div>
                            <button class="rtf-btn" @click.prevent="formatDoc('justifyLeft')" title="Align Left"><i class="fas fa-align-left"></i></button>
                            <button class="rtf-btn" @click.prevent="formatDoc('justifyCenter')" title="Align Center"><i class="fas fa-align-center"></i></button>
                            <button class="rtf-btn" @click.prevent="formatDoc('justifyRight')" title="Align Right"><i class="fas fa-align-right"></i></button>
                            
                            <div style="width: 1px; background: var(--border); margin: 0 4px; height: 24px;"></div>
                            <button class="rtf-btn" @click.prevent="insertTable" title="Insert Table"><i class="fas fa-table"></i></button>
                            
                            <div style="width: 1px; background: var(--border); margin: 0 4px; height: 24px;"></div>
                            
                            <div style="position: relative; margin-left: auto;" @click.stop>
                                <div @click="activeDropdown = activeDropdown === 'journal_ref' ? null : 'journal_ref'" style="padding: 4px 8px; font-size: 0.85rem; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; height: 32px; display: flex; align-items: center; gap: 6px;">
                                    <span>+ Reference Stock</span>
                                    <i class="fas fa-chevron-down" style="opacity: 0.5;"></i>
                                </div>
                                <div v-if="activeDropdown === 'journal_ref'" style="position: absolute; top: 100%; right: 0; z-index: 100; background: var(--surface); border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: var(--radius); min-width: 250px; display: flex; flex-direction: column;">
                                    <div style="display: flex; gap: 5px; padding: 5px; border-bottom: 1px solid var(--border);">
                                        <label class="checkbox-label" style="font-weight: bold; font-size: 0.75rem;"><input type="radio" value="Global" v-model="journalRefSearchScope"> Global</label>
                                        <label class="checkbox-label" style="font-weight: bold; font-size: 0.75rem;"><input type="radio" value="Personal" v-model="journalRefSearchScope"> Personal</label>
                                    </div>
                                    <input type="text" v-model="rtfSearchQuery" placeholder="Search inventory..." style="margin: 5px; width: calc(100% - 10px); padding: 4px; border: 1px solid var(--border); border-radius: var(--radius);" @click.stop>
                                    <div style="overflow-y: auto; max-height: 200px;">
                                        <div v-for="inv in filterBlockInventory(rtfSearchQuery, journalRefSearchScope)" :key="inv.id" @mousedown.prevent="selectedInvRef = inv.id; insertInventoryRef(); activeDropdown = null" style="padding: 6px 10px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid var(--bg);" onmouseover="this.style.background='var(--summary-bg)'" onmouseout="this.style.background='transparent'">
                                            [{{ inv.code }}] {{ inv.name }} ({{inv.stock}} {{inv.stockUnit || 'µM'}})
                                        </div>
                                    </div>

        computed: {
            stdConcUnitStr() {
                if (this.stdCalc.concUnit === 1) return 'M';
                if (this.stdCalc.concUnit === 0.001) return 'mM';
                if (this.stdCalc.concUnit === 0.000001) return 'µM';
                if (this.stdCalc.concUnit === 0.000000001) return 'nM';
                return 'µM';
            },
            calculatedStdMass() {
                if (this.stdCalc.type !== 'liquid' || !this.stdCalc.vol || !this.stdCalc.density) return null;
                let massInGrams = (this.stdCalc.vol * this.stdCalc.volUnit * 1000) * this.stdCalc.density;
                if (massInGrams >= 1) return this.formatNum(massInGrams) + ' g';
                if (massInGrams >= 1e-3) return this.formatNum(massInGrams * 1e3) + ' mg';
                return this.formatNum(massInGrams * 1e6) + ' µg';
            },
            calculatedPureConc() {
                if (this.stdCalc.type !== 'liquid' || !this.stdCalc.density || !this.stdCalc.mw) return null;
                const molarity = (this.stdCalc.density * 1000) / this.stdCalc.mw;
                if (molarity >= 1) return this.formatNum(molarity) + ' M';
                if (molarity >= 1e-3) return this.formatNum(molarity * 1e3) + ' mM';
                return this.formatNum(molarity * 1e6) + ' µM';
            },
            calculatedStdVolume() {
                if (!this.stdCalc.mw || !this.stdCalc.conc) return '0.000 µL';
                let massInGrams = 0;
                if (this.stdCalc.type === 'liquid') {
                    if (!this.stdCalc.vol || !this.stdCalc.density) return '0.000 µL';
                    massInGrams = (this.stdCalc.vol * this.stdCalc.volUnit * 1000) * this.stdCalc.density;
                } else {
                    if (!this.stdCalc.mass) return '0.000 µL';
                    massInGrams = this.stdCalc.mass * this.stdCalc.massUnit;
                }
                const moles = massInGrams / this.stdCalc.mw;
                const concInMolar = this.stdCalc.conc * this.stdCalc.concUnit;
                const volumeInLiters = moles / concInMolar;
                if (volumeInLiters === Infinity || isNaN(volumeInLiters)) return 'Error';
                if (volumeInLiters >= 1) return this.formatNum(volumeInLiters) + ' L';
                if (volumeInLiters >= 1e-3) return this.formatNum(volumeInLiters * 1e3) + ' mL';
                if (volumeInLiters >= 1e-6) return this.formatNum(volumeInLiters * 1e6) + ' µL';
                return this.formatNum(volumeInLiters * 1e9) + ' nL';
            },
            concInUM() {
                if (!this.stdCalc.conc) return 0;
                return (this.stdCalc.conc * this.stdCalc.concUnit) / 1e-6;
            },
            calculatedLength() {
                return this.dnaCalc.sequence.replace(/\[.*?\]/g, '').replace(/[^a-zA-Z]/g, '').length;
            },
            calculatedGc() {
                const seq = this.dnaCalc.sequence.replace(/\[.*?\]/g, '').toUpperCase().replace(/[^ACGTU]/g, '');
                if (!seq.length) return 0;
                let gc = 0;
                for (let i = 0; i < seq.length; i++) {
                    if (seq[i] === 'G' || seq[i] === 'C') gc++;
                }
                return (gc / seq.length) * 100;
            },
            calculatedTm() {
                return this.calcSeqTm(this.dnaCalc.sequence);
            },
            calculatedExtinction() {
                return this.calcSeqExtinction(this.dnaCalc.sequence, this.dnaCalc.type);
            },
            calculatedMw() {
                return this.calcSeqMw(this.dnaCalc.sequence, this.dnaCalc.type);
            },
            activeMw() { return this.dnaCalc.manualMw ? this.dnaCalc.manualMw : this.calculatedMw; },
            
            dnaConcentration() {
                if (!this.dnaCalc.a260) return 0;
                const l = this.dnaCalc.pathLength || 0.05;
                if (this.calculatedExtinction) {
                    return (this.dnaCalc.a260 / (this.calculatedExtinction * l)) * 1000000;
                }
                if (this.dnaCalc.manualMw) {
                    return ((this.dnaCalc.a260 * 33 * (1/l)) * 1000) / this.dnaCalc.manualMw;
                }
                return 0;
            },
            dnaMassConcentration() {
                if (!this.dnaConcentration) return 0;
                return (this.dnaConcentration * this.activeMw) / 1000;
            },

            filteredInventory() {
                const term = this.inventorySearch.toLowerCase();
                return this.inventory.filter(item => 
                    (item.scope === this.inventoryMode || (!item.scope && this.inventoryMode === 'Global')) &&
                    ((item.name && item.name.toLowerCase().includes(term)) || 
                     (item.code && item.code.toLowerCase().includes(term)) ||
                     (item.cas && item.cas.toLowerCase().includes(term)))
                );
            },
            filteredArchivedReactions() {
                if (!this.archiveReactionSearch) return this.archivedReactions;
                const term = this.archiveReactionSearch.toLowerCase();
                return this.archivedReactions.filter(item => 
                    (item.name && item.name.toLowerCase().includes(term))
                );
            },
            activeJournalEntry() { return this.journal.entries.find(e => e.id === this.journal.activeId); },
            sortedJournalEntries() { return [...this.journal.entries].sort((a, b) => new Date(b.date) - new Date(a.date)); }
        },
        methods: {
            // --- AUTHENTICATION METHODS ---
            async signUp() {

            async signOut() {

            },

            // --- CLOUD DATABASE METHODS ---
            async loadCloudInventory() {
                // This pulls BOTH Global items and this specific user's Personal items automatically!
                const { data, error } = await db.from('inventory').select('*');
                if (error) {
                    console.error("Error loading inventory:", error);
                    return;
                }
                // Convert the cloud data back into your Vue array
                this.inventory = data.map(row => row.item_data);
            },

            async saveItemToCloud(item) {
                if (!this.user) return;
                
                // We package your item into the format our SQL table expects
                const payload = {
                    owner_id: this.user.id,
                    scope: item.scope || 'Global',
                    item_data: item
                };

                const { error } = await db.from('inventory').insert([payload]);
                if (error) alert("Error saving to cloud: " + error.message);
            },

            updateDefaultLabware(plate) {
                if (plate.format === 384) plate.targetLabware = '201901101700';
                else if (plate.format === 96) plate.targetLabware = '201812181400';
                else if (plate.format === 24) plate.targetLabware = '201901101715';
                else plate.targetLabware = '';
            },
            fillRmRow(rm, comp) {
                if (!comp.quickRow || comp.quickRowVal === undefined || comp.quickRowVal === null) return;
                const r = comp.quickRow - 1;
                for (let c = 0; c < rm.cols; c++) {
                    comp.grid[r + '_' + c] = comp.quickRowVal;
                }
            },
            fillRmCol(rm, comp) {
                if (!comp.quickCol || comp.quickColVal === undefined || comp.quickColVal === null) return;
                const c = comp.quickCol - 1;
                for (let r = 0; r < rm.rows; r++) {
                    comp.grid[r + '_' + c] = comp.quickColVal;
                }
            },
            clearRmGrid(rm, comp) {
                if(confirm('Clear all concentrations for this component?')) {
                    for (let key in comp.grid) {
                        comp.grid[key] = null;
                    }
                }
            },
            applyRmGradient(rm, comp) {
                if (comp.gradStart === undefined || comp.gradStart === null || comp.gradStart === '') return;
                if ((comp.gradEnd === undefined || comp.gradEnd === null || comp.gradEnd === '') && 
                    (comp.gradStep === undefined || comp.gradStep === null || comp.gradStep === '')) return;

                const dir = comp.gradDir || 'all_row';
                const startVal = Number(comp.gradStart);

                const getStepVal = (steps) => {
                    if (comp.gradStep !== null && comp.gradStep !== undefined && comp.gradStep !== '') {
                        return Number(comp.gradStep);
                    }
                    const endVal = Number(comp.gradEnd);
                    return steps > 0 ? (endVal - startVal) / steps : 0;
                };

                if (dir === 'row') {
                    if (!comp.gradIndex) return;
                    const r = comp.gradIndex - 1;
                    const stepVal = getStepVal(rm.cols - 1);
                    for (let c = 0; c < rm.cols; c++) {
                        comp.grid[r + '_' + c] = parseFloat((startVal + (stepVal * c)).toFixed(4));
                    }
                } else if (dir === 'col') {
                    if (!comp.gradIndex) return;
                    const c = comp.gradIndex - 1;
                    const stepVal = getStepVal(rm.rows - 1);
                    for (let r = 0; r < rm.rows; r++) {
                        comp.grid[r + '_' + c] = parseFloat((startVal + (stepVal * r)).toFixed(4));
                    }
                } else if (dir === 'all_row') {
                    const stepVal = getStepVal(rm.cols - 1);
                    for (let r = 0; r < rm.rows; r++) {
                        for (let c = 0; c < rm.cols; c++) {
                            comp.grid[r + '_' + c] = parseFloat((startVal + (stepVal * c)).toFixed(4));
                        }
                    }
                } else if (dir === 'all_col') {
                    const stepVal = getStepVal(rm.rows - 1);
                    for (let c = 0; c < rm.cols; c++) {
                        for (let r = 0; r < rm.rows; r++) {
                            comp.grid[r + '_' + c] = parseFloat((startVal + (stepVal * r)).toFixed(4));
                        }
                    }
                }
            },

            // --- ANDREW PLUS PROTOCOL EXPORT ---
            exportAndrewPlus(plate) {
                if (plate.format === 'ibidi' || plate.format === 'pcr8') {
                    alert("Export to Andrew+ is not available for Ibidi gamma chambers or 8 PCR strips.");
                    return;
                }
                if (!plate || !plate.wells || Object.keys(plate.wells).length === 0) {
                    alert("Plate is empty.");
                    return;
                }

                const md5 = function(d) {
                    d = unescape(encodeURIComponent(d));
                    
                    let h0 = 0x67452301, h1 = 0xEFCDAB89, h2 = 0x98BADCFE, h3 = 0x10325476;
                    const rots = [7, 12, 17, 22, 5, 9, 14, 20, 4, 11, 16, 23, 6, 10, 15, 21];
                    const k = [];
                    for (let i = 0; i <= 63; i++) k[i] = (Math.abs(Math.sin(i + 1)) * 0x100000000) | 0;
                    let words = [];
                    for (let i = 0; i < d.length; i++) words[i >> 2] |= (d.charCodeAt(i) & 0xFF) << ((i % 4) * 8);
                    let len = d.length * 8;
                    words[len >> 5] |= 0x80 << (len % 32);
                    words[(((len + 64) >>> 9) << 4) + 14] = len;
                    for (let i = 0; i < words.length; i += 16) {
                        let a = h0, b = h1, c = h2, d2 = h3;
                        for (let j = 0; j <= 63; j++) {
                            let f, g = j;
                            if (j < 16) { f = (b & c) | ((~b) & d2); }
                            else if (j < 32) { f = (d2 & b) | ((~d2) & c); g = (5 * j + 1) % 16; }
                            else if (j < 48) { f = b ^ c ^ d2; g = (3 * j + 5) % 16; }
                            else { f = c ^ (b | (~d2)); g = (7 * j) % 16; }
                            let temp = d2; d2 = c; c = b;
                            let x = a + f + k[j] + (words[i + g] || 0);
                            let rot = rots[(Math.floor(j / 16) * 4) + (j % 4)];
                            b = b + ((x << rot) | (x >>> (32 - rot)));
                            a = temp;
                        }
                        h0 = (h0 + a) | 0; h1 = (h1 + b) | 0; h2 = (h2 + c) | 0; h3 = (h3 + d2) | 0;
                    }
                    const hex = (x) => {
                        let s = '';
                        for (let i = 0; i < 4; i++) s += ((x >> (i * 8)) & 0xFF).toString(16).padStart(2, '0');
                        return s;
                    };
                    return hex(h0) + hex(h1) + hex(h2) + hex(h3);
                };

                const transfers = [];
                const parser = new DOMParser();

                for (const [wId, html] of Object.entries(plate.wells)) {
                    if (!html || html.trim() === '') continue;
                    const doc = parser.parseFromString(html, 'text/html');

                    const row = wId.charCodeAt(0) - 64;
                    const col = parseInt(wId.substring(1));
                    const destCavity = { row, column: col };

                    const refs = doc.querySelectorAll('.inv-ref');
                    refs.forEach(ref => {
                        let text = ref.innerText;
                        // Extraction for data-labware injected by UI
                        let labwareAttr = ref.getAttribute('data-labware');
                        let labwareUuid = (labwareAttr && labwareAttr.trim() !== '') ? labwareAttr : 'eda1c3ac-a089-4244-b0bc-9e5beb322475';

                        let nameMatch = text.match(/\]\s*(.*?)\s*\(/);
                        let name = nameMatch ? nameMatch[1].trim() : text.replace(/\[.*?\]/, '').replace(/\(.*?\)/, '').trim();

                        let concValue = 100;
                        let concUnit = "uM";
                        let concMatch = text.match(/\(([\d\.,]+)\s*([^)]+)\)/);
                        if (concMatch) {
                            concValue = parseFloat(concMatch[1].replace(',', '.'));
                            concUnit = concMatch[2].trim().replace('µ', 'u');
                        }

                        let nextText = ref.nextSibling ? ref.nextSibling.textContent : "";
                        let volMatch = nextText.match(/([\d\.]+)\s*(µL|μL|mL|L)/);
                        if (name && volMatch) {
                            let vol = parseFloat(volMatch[1]);
                            if (volMatch[2] === 'mL') vol *= 1000;
                            if (volMatch[2] === 'L') vol *= 1000000;
                            if (vol > 0) transfers.push({ sourceName: name, destCavity, volume: vol, type: 'reagent', concValue: concValue, concUnit: concUnit, labwareUuid: labwareUuid });
                        }
                    });

                    const strongs = doc.querySelectorAll('strong');
                    strongs.forEach(st => {
                        if (st.innerText.includes('MQ H₂O') || st.innerText.includes('MQ Water')) {
                            let volText = "";
                            if (st.nextElementSibling && st.nextElementSibling.tagName === 'SPAN') {
                                volText = st.nextElementSibling.innerText;
                            } else if (st.nextSibling && st.nextSibling.nodeType === Node.TEXT_NODE) {
                                volText = st.nextSibling.textContent;
                            }
                            
                            let volMatch = volText.match(/([\d\.]+)\s*(µL|mL|L)/);
                            if (volMatch) {
                                let vol = parseFloat(volMatch[1]);
                                if(volMatch[2] === 'mL') vol *= 1000;
                                if(volMatch[2] === 'L') vol *= 1000000;
                                // Water explicitly mapped to 50 mL Falcon Tube per instructions
                                if (vol > 0) transfers.push({ sourceName: 'Water', destCavity, volume: vol, type: 'water', labwareUuid: '201812181100' });
                            }
                        }
                    });
                }

                if (transfers.length === 0) {
                    alert("No pipetting transfers found in the plate.");
                    return;
                }

                const generateHex = (len) => [...Array(len)].map(() => Math.floor(Math.random() * 16).toString(16)).join('');
                const generateUUID = () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });

                const targetPlateRef = generateHex(16);
                const waterLabwareRef = generateHex(16);
                const waterReagentRef = generateHex(16);

                let defaultTargetUuid = plate.format === 384 ? '201901101700' : (plate.format === 24 ? '201901101715' : '201812181400');
                const targetLabwareUuid = plate.targetLabware || defaultTargetUuid;

                const labwares = [
                    {
                        ref: targetPlateRef,
                        name: plate.name || "Target Plate",
                        presentation: { position: { x: 3810, y: 3940 } },
                        isTarget: false, 
                        throwAwayTipsAfterUse: false,
                        labware: { uuid: targetLabwareUuid } 
                    }
                ];

                const reagents = [];
                const sourceMap = {}; 
                const sourceDataMap = {};

                // Group by Source Key (Name + specific labware selection)
                transfers.forEach(t => {
                    if (t.type === 'reagent' && !sourceDataMap[t.sourceName]) {
                        sourceDataMap[t.sourceName] = { concValue: t.concValue, concUnit: t.concUnit };
                    }
                    const sourceKey = t.sourceName + '_' + t.labwareUuid;
                    if (!sourceMap[sourceKey]) {
                        sourceMap[sourceKey] = {
                            labwareRef: t.type === 'water' ? waterLabwareRef : generateHex(16),
                            reagentRef: t.type === 'water' ? waterReagentRef : generateHex(16),
                            labwareUuid: t.labwareUuid,
                            sourceName: t.sourceName,
                            isWater: t.type === 'water'
                        };
                    }
                    t.sourceKey = sourceKey;
                });

                let idx = 0;
                for (const [key, data] of Object.entries(sourceMap)) {
                    labwares.push({
                        ref: data.labwareRef,
                        name: data.isWater ? "Water" : data.sourceName,
                        presentation: { position: { x: 3860 + (idx * 220 % 800), y: 3700 + Math.floor(idx/4)*180 } },
                        isTarget: false,
                        throwAwayTipsAfterUse: false,
                        labware: { uuid: data.labwareUuid } 
                    });

                    const reagentPayload = {
                        uuid: data.isWater ? "44fb2f8b-7d33-4bc0-8b51-0a1fd26b63ec" : generateUUID(), 
                        name: data.isWater ? "Water" : data.sourceName,
                        concentrationValue: data.isWater ? "1.000" : (sourceDataMap[data.sourceName] ? sourceDataMap[data.sourceName].concValue.toString() : "100.000"),
                        concentrationUnit: data.isWater ? "au" : (sourceDataMap[data.sourceName] ? sourceDataMap[data.sourceName].concUnit : "uM"),
                        color: Math.floor(Math.random() * 16777215),
                        sample: false
                    };

                    if (!data.isWater) {
                        reagentPayload.description = "";
                        reagentPayload.link = "";
                    }

                    reagents.push({
                        isReagent: true,
                        ref: data.reagentRef,
                        reagent: reagentPayload
                    });
                    idx++;
                }

                const initialVolumes = {};
                transfers.forEach(t => {
                    initialVolumes[t.sourceKey] = (initialVolumes[t.sourceKey] || 0) + t.volume;
                });

                const labwareStates = {};
                labwareStates[targetPlateRef] = { labwareRef: targetPlateRef, cavityStates: {}, inError: false };

                for (const [key, data] of Object.entries(sourceMap)) {
                    const totalVol = Number((initialVolumes[key] * 1.2).toFixed(3)); 
                    labwareStates[data.labwareRef] = {
                        labwareRef: data.labwareRef,
                        cavityStates: {
                            "1-1": {
                                cavity: { row: 1, column: 1 },
                                solution: {
                                    volume: { value: totalVol, unit: "uL" },
                                    color: reagents.find(r => r.ref === data.reagentRef).reagent.color,
                                    content: {
                                        [data.reagentRef]: {
                                            reagentRef: data.reagentRef,
                                            origins: [`${data.labwareRef}_A1`],
                                            dilutionFactor: 1,
                                            volume: { value: totalVol, unit: "uL" },
                                            color: reagents.find(r => r.ref === data.reagentRef).reagent.color
                                        }
                                    }
                                }
                            },
                            auto: true
                        },
                        inError: false // FIXED: Replaced semicolon with colon
                    };
                }

                const steps = [
                    {
                        index: 0,
                        state: { labwareStates, errors: [], warnings: [] },
                        ref: generateHex(16),
                        groupStepRefs: []
                    }
                ];

                const groupedTransfers = {};
                transfers.forEach(t => {
                    const formattedVol = Number(t.volume.toFixed(3));
                    const key = `${t.sourceKey}_${formattedVol}`;
                    if (!groupedTransfers[key]) {
                        groupedTransfers[key] = { sourceKey: t.sourceKey, volume: formattedVol, cavities: [] };
                    }
                    groupedTransfers[key].childCavities = groupedTransfers[key].cavities || []; // safety
                    groupedTransfers[key].cavities.push(t.destCavity);
                });

                let stepIdx = 1;
                for (const group of Object.values(groupedTransfers)) {
                    const srcData = sourceMap[group.sourceKey];

                    steps.push({
                        index: stepIdx++,
                        actionTypeId: "PIPETTING",
                        action: {
                            type: "PIPETTING",
                            sources: [{ labwareRef: srcData.labwareRef, cavities: [{ row: 1, column: 1 }], customPipettingPolicy: false }],
                            destinations: [{ labwareRef: targetPlateRef, cavities: group.cavities, customPipettingPolicy: false }],
                            params: {
                                volume: { value: group.volume, unit: "uL" },
                                mode: "forward",
                                aspirationSpeed: "normal",
                                dispensingSpeed: "normal",
                                airTopCushion: false,
                                airBottomCushion: false,
                                tipChangeBeginning: true,
                                tipChangeBetween: true,
                                tipWithFilter: false,
                                movingSpeed: "normal",
                                verifyTip: false,
                                blowOut: true,
                                blowOutPause: false,
                                tipTouch: false,
                                armSpeed: "normal",
                                preciseAspirationSpeed: 5,
                                preciseDispensingSpeed: 5,
                                preciseFluidicSpeedEnabled: false
                            },
                            mixingSource: { enabled: false, times: 3, speed: "normal", volume: { value: 0, unit: "uL" }, preciseSpeed: 5, preciseSpeedEnabled: false },
                            tipPositionSource: { position: "liquid", customHeight: false, customHeightValue: 0, avoidTouch: false },
                            mixingDest: { enabled: false, times: 3, speed: "normal", volume: { value: 0, unit: "uL" }, preciseSpeed: 5, preciseSpeedEnabled: false },
                            tipPositionDest: { position: "bottom", customHeight: false, customHeightValue: 0, avoidTouch: false }
                        },
                        ref: generateHex(16),
                        groupStepRefs: []
                    });
                }

                const baseProtocol = {
                    name: plate.name || "Exported Protocol",
                    description: "Exported from BoekhovenLab Calculator",
                    params: { pipettingPolicy: "rbr", filterTips: false, safeTipOverfly: false },
                    errors: 0,
                    steps: steps,
                    labwares: labwares,
                    reagents: reagents,
                    samples: [],
                    pipettingPolicy: "rbr",
                    isDynamic: false,
                    version: "1.2.0"
                };

                const jsonStr = JSON.stringify(baseProtocol);
                const checksum = md5(jsonStr);

            calcSeqExtinction(rawSeq, type) {
                if (!rawSeq) return 0;
                const seq = rawSeq.replace(/\[.*?\]/g, '').toUpperCase().replace(/[^ACGTU]/g, '').replace(/U/g, 'T');
                if (seq.length === 0) return 0;
                if (type === 'RNA') {
                    const indRNA = { 'A': 15300, 'C': 7200, 'G': 11800, 'T': 9300, 'U': 9300 };
                    const nnRNA = {
                        'AA': 27400, 'AC': 21000, 'AG': 25000, 'AU': 24000,
                        'CA': 21000, 'CC': 14200, 'CG': 17800, 'CU': 16200,
                        'GA': 25200, 'GC': 17400, 'GG': 21600, 'GU': 21200,
                        'UA': 23200, 'UC': 16000, 'UG': 19000, 'UU': 18400,
                        'AT': 24000, 'TA': 23200, 'CT': 16200, 'TC': 16000, 'GT': 21200, 'TG': 19000, 'TT': 18400
                    };
                    let e = 0;
                    const cleanRNA = seq.replace(/T/g, 'U');
                    for (let i = 0; i < cleanRNA.length - 1; i++) {
                        e += nnRNA[cleanRNA.substring(i, i + 2)] || 0;
                    }
                    for (let i = 1; i < cleanRNA.length - 1; i++) {
                        e -= indRNA[cleanRNA[i]] || 0;
                    }
                    return e;
                } else {
                    const ind = { 'A': 15400, 'C': 7400, 'G': 11500, 'T': 8700 };
                    const nn = {
                        'AA': 27400, 'AC': 21200, 'AG': 25000, 'AT': 22800,
                        'CA': 21200, 'CC': 14600, 'CG': 18000, 'CT': 15200,
                        'GA': 25200, 'GC': 17600, 'GG': 21600, 'GT': 20000,
                        'TA': 23400, 'TC': 16200, 'TG': 19000, 'TT': 16800
                    };
                    let e = 0;
                    for (let i = 0; i < seq.length - 1; i++) {
                        e += nn[seq.substring(i, i + 2)] || 0;
                    }
                    for (let i = 1; i < seq.length - 1; i++) {
                        e -= ind[seq[i]] || 0;
                    }
                    return e;
                }
            },

            calcSeqMw(rawSeq, type) {
                if (!rawSeq) return 0;
                const seq = rawSeq.replace(/\[.*?\]/g, '').toUpperCase().replace(/[^ACGTU]/g, '');
                if (seq.length === 0) return 0;
                let a = 0, c = 0, g = 0, t = 0, u = 0;
                for (let i = 0; i < seq.length; i++) {
                    if (seq[i] === 'A') a++;
                    else if (seq[i] === 'C') c++;
                    else if (seq[i] === 'G') g++;
                    else if (seq[i] === 'T') t++;
                    else if (seq[i] === 'U') u++;
                }
                if (type === 'RNA') {
                    return (a * 329.21) + (c * 305.18) + (g * 345.21) + (u * 306.2) - 61.96;
                } else {
                    return (a * 313.21) + (c * 289.18) + (g * 329.21) + (t * 304.2) - 61.96;
                }
            },

            calcSeqTm(rawSeq) {
                if (!rawSeq) return 0;
                const seq = rawSeq.replace(/\[.*?\]/g, '').toUpperCase().replace(/[^ACGT]/g, '');
                const len = seq.length;
                if (len < 2) return 0;

                // SantaLucia 1998 Nearest-Neighbor Thermodynamics (used by IDT)
                // Values for dH are kcal/mol, dS are cal/(K*mol)
                const nnParams = {
                    'AA': { dH: -7.9, dS: -22.2 }, 'TT': { dH: -7.9, dS: -22.2 },
                    'AT': { dH: -7.2, dS: -20.4 }, 'TA': { dH: -7.2, dS: -21.3 },
                    'CA': { dH: -8.5, dS: -22.7 }, 'TG': { dH: -8.5, dS: -22.7 },
                    'GT': { dH: -8.4, dS: -22.4 }, 'AC': { dH: -8.4, dS: -22.4 },
                    'CT': { dH: -7.8, dS: -21.0 }, 'AG': { dH: -7.8, dS: -21.0 },
                    'GA': { dH: -8.2, dS: -22.2 }, 'TC': { dH: -8.2, dS: -22.2 },
                    'CG': { dH: -10.6, dS: -27.2 }, 'GC': { dH: -9.8, dS: -24.4 },
                    'GG': { dH: -8.0, dS: -19.9 }, 'CC': { dH: -8.0, dS: -19.9 }
                };

                let dH = 0.2; // Initiation dH
                let dS = -5.7; // Initiation dS

                // Terminal AT penalties
                if (seq[0] === 'A' || seq[0] === 'T') { dH += 2.2; dS += 6.9; }
                if (seq[len-1] === 'A' || seq[len-1] === 'T') { dH += 2.2; dS += 6.9; }

                for (let i = 0; i < len - 1; i++) {
                    const pair = seq.substring(i, i + 2);
                    if (nnParams[pair]) {
                        dH += nnParams[pair].dH;
                        dS += nnParams[pair].dS;
                    }
                }

                // IDT Default Parameters
                const naConc = 0.05; // 50 mM Na+
                const oligoConc = 0.25e-6; // 0.25 µM

                // Entropy salt correction
                dS = dS + 0.368 * (len - 1) * Math.log(naConc);

                // Tm Calculation (R = 1.987 cal/(mol*K))
                const tm = (dH * 1000) / (dS + 1.987 * Math.log(oligoConc / 4)) - 273.15;

                return Math.max(0, tm);
            },

            updateManualSequence(item) {
                if (!item.sequence) item.sequence = '';
                const cleanSeq = item.sequence.replace(/\[.*?\]/g, '').toUpperCase().replace(/[^ACGTU]/g, '');
                if (!item.oligoType) item.oligoType = 'DNA';
                item.length = cleanSeq.length;
                item.extinction = this.calcSeqExtinction(item.sequence, item.oligoType);
                const calcMw = this.calcSeqMw(item.sequence, item.oligoType);
                item.mw = item.manualMw ? item.manualMw : calcMw;
                item.tm = this.calcSeqTm(item.sequence);
                
                if (cleanSeq.length > 0) {
                    let gcCount = 0;
                    for (let i = 0; i < cleanSeq.length; i++) {
                        if (cleanSeq[i] === 'G' || cleanSeq[i] === 'C') gcCount++;
                    }
                    item.gc = (gcCount / cleanSeq.length) * 100;
                } else {
                    item.gc = 0;
                }
            },
            
            calculatedGcFallback(sequence) {
                const seq = sequence.replace(/\[.*?\]/g, '').toUpperCase().replace(/[^ACGTU]/g, '');
                if (!seq.length) return 0;
                let gc = 0;
                for (let i = 0; i < seq.length; i++) {
                    if (seq[i] === 'G' || seq[i] === 'C') gc++;
                }
                return (gc / seq.length) * 100;
            },

            calcRMCellHTML(rm, rIndex, cIndex) {
                let htmlStr = "";
                let totalVol = 0;
                const unit = rm.targetVolumeUnit || 'µL';
                const tv = Number(rm.targetVolume);
                
                rm.components.forEach(comp => {
                    const targetVal = Number(comp.grid[rIndex + '_' + cIndex] || 0);
                    if (targetVal > 0 && comp.invId) {
                        const invItem = this.inventory.find(i => i.id === comp.invId);
                        if (invItem) {
                            let v = 0;
                            let displayTarget = '';
                            if (comp.inputType === 'vol') {
                                v = targetVal;
                                displayTarget = `${targetVal} ${unit} (Fixed)`;
                            } else {
                                const targetUM = this.getUM(targetVal, comp.targetUnit);
                                const stockUM = this.getUM(Number(invItem.stock), invItem.stockUnit || 'µM');
                                v = stockUM ? (targetUM * tv) / stockUM : 0;
                                displayTarget = `${targetVal} ${comp.targetUnit}`;
                            }
                            totalVol += v;
                            htmlStr += `&nbsp;<span class="inv-ref" contenteditable="false" data-labware="${comp.labware || ''}"><i class="fas fa-tag"></i>&nbsp;[${invItem.code}] ${invItem.name} (${this.formatNum(invItem.stock)} ${invItem.stockUnit || 'µM'})&nbsp;<i class="fas fa-times" style="cursor:pointer; margin-left:4px; opacity: 0.7;" onclick="let ce = this.closest('[contenteditable]'); this.parentElement.remove(); if(ce) ce.dispatchEvent(new Event('input', {bubbles: true}));" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"></i></span>&nbsp; ${this.formatNum(v)} ${unit} (${displayTarget})<br>`;
                        }
                    }
                });
                
                if (totalVol === 0) return "";
                const h2o = tv - totalVol;
                if (h2o < 0) return `<span class="error"><i class="fas fa-triangle-exclamation"></i> Exceeds Vol (${this.formatNum(totalVol)}${unit})</span><br>${htmlStr}`;
                
                htmlStr += `
                    <div style="margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px;">
                        <strong>MQ H₂O:</strong> <span style="color: var(--primary); font-weight: bold;">${this.formatNum(h2o)} ${unit}</span>
                    </div>
                `;
                return htmlStr;
            },
            saveReverseMatrixToJournal(rm) {

                const unit = rm.targetVolumeUnit || 'µL';
                const tv = Number(rm.targetVolume);

                rm.components.forEach(comp => {

                    const targetUnitLabel = comp.inputType === 'vol' ? unit : (comp.targetUnit || 'µM');
