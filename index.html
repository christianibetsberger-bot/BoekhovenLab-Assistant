                    html += `<th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px;">${name} Vol (${unit})</th>`;
                });
                
                html += `<th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px;">MQ H₂O (${unit})</th></tr></thead><tbody>`;
                
                for (let r = 0; r < rm.rows; r++) {
                    for (let c = 0; c < rm.cols; c++) {
                        let cellHasContent = false;
                        rm.components.forEach(comp => { if(Number(comp.grid[r + '_' + c]) > 0) cellHasContent = true; });
                        
                        if (cellHasContent) {
                            const rowLabel = String.fromCharCode(65 + r);
                            html += `<tr><td style="border: 1px solid var(--border); padding: 8px; font-weight: bold;">${rowLabel}${c+1}</td>`;
                            let totalVol = 0;
                            
                            rm.components.forEach(comp => {
                                const targetVal = Number(comp.grid[r + '_' + c] || 0);
                                const invItem = this.inventory.find(i => i.id === comp.invId);
                                let v = 0;
                                if (targetVal > 0 && invItem) {
                                    if (comp.inputType === 'vol') {
                                        v = targetVal;
                                    } else {
                                        const targetUM = this.getUM(targetVal, comp.targetUnit);
                                        const stockUM = this.getUM(Number(invItem.stock), invItem.stockUnit || 'µM');
                                        v = stockUM ? (targetUM * tv) / stockUM : 0;
                                    }
                                    totalVol += v;
                                }
                                html += `<td style="border: 1px solid var(--border); padding: 8px;">${targetVal > 0 ? targetVal : '-'}</td>`;
                                html += `<td style="border: 1px solid var(--border); padding: 8px; color: var(--primary);">${targetVal > 0 ? this.formatNum(v) : '-'}</td>`;
                            });
                            
                            const h2o = tv - totalVol;
                            html += `<td style="border: 1px solid var(--border); padding: 8px; font-weight: bold;">${h2o < 0 ? 'Error (Exceeds TV)' : this.formatNum(h2o)}</td></tr>`;
                        }
                    }
                }
                html += `</tbody></table></div></div><br>`;
                this.activeJournalEntry.content += html;
                this.syncEditor();
            },
            saveReverseMatrixToPlate(rm) {
                if (!rm.targetPlateId || !rm.targetStartWell) { alert("Please select a target plate and starting well."); return; }
                const plate = this.wellPlates.find(p => p.id === rm.targetPlateId);
                if (!plate) return;
                const startWell = rm.targetStartWell.toUpperCase().trim();
                const match = startWell.match(/^([A-Z]+)(\d+)$/);
                if (!match) { alert("Invalid well format. Use A1, B2, etc."); return; }
                let startRow = match[1].charCodeAt(0) - 65; 
                let startCol = parseInt(match[2]) - 1;
                
                for (let r = 0; r < rm.rows; r++) {
                    for (let c = 0; c < rm.cols; c++) {
                        let targetR = startRow + r;
                        let targetC = startCol + c;
                        if (targetR < this.getPlateRows(plate.format) && targetC < this.getPlateCols(plate.format)) {
                            let wId = this.getWellId(targetR, targetC);
                            let cellHtml = this.calcRMCellHTML(rm, r, c);
                            if (cellHtml) {
                                plate.wells[wId] = cellHtml;
                            }
                        }
                    }
                }
                alert(`Successfully sent screening to Plate: ${plate.name} starting at ${startWell}`);
            },

            archivePlate(index) {
                if(confirm("Archive this well plate?")) {
                    this.archivedPlates.push(this.wellPlates.splice(index, 1)[0]);
                }
            },
            restorePlate(index) {
                this.wellPlates.unshift(this.archivedPlates.splice(index, 1)[0]);
            },
            duplicateWellPlate(index) {
                const copy = JSON.parse(JSON.stringify(this.wellPlates[index]));
                copy.id = this.nextPlateId++;
                copy.name += ' (Copy)';
                this.wellPlates.splice(index + 1, 0, copy);
            },

            exportArchive() {
                const data = {
                    reactions: this.archivedReactions,
                    matrices: this.archivedMatrices,
                    reverseMatrices: this.archivedReverseMatrices,
                    plates: this.archivedPlates
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `BoekhovenLab_Archive_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },
            importArchive(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        if(parsed.reactions) this.archivedReactions.push(...parsed.reactions);
                        if(parsed.matrices) this.archivedMatrices.push(...parsed.matrices);
                        if(parsed.reverseMatrices) this.archivedReverseMatrices.push(...parsed.reverseMatrices);
                        if(parsed.plates) this.archivedPlates.push(...parsed.plates);
                        alert("Archive imported successfully!");
                    } catch(err) {
                        console.error(err);
                        alert("Error parsing archive file. Ensure it is a valid JSON export.");
                    }
                    event.target.value = '';
                };
                reader.readAsText(file);
            },

            processImports(importedItems, sourceName) {
                if (importedItems.length === 0) {
                    alert("No valid items found to import from " + sourceName + ".");
                    return;
                }
                
                let duplicates = [];
                let novelItems = [];
                
                for (let i = 0; i < importedItems.length; i++) {
                    let newItem = importedItems[i];
                    newItem.scope = this.importTargetMode;
                    
                    let cleanNewSeq = (newItem.sequence || '').replace(/\[.*?\]/g, '').toUpperCase().replace(/[^ACGTU]/g, '');
                    
                    let existingIdx = -1;
                    if (cleanNewSeq.length > 0) {
                        existingIdx = this.inventory.findIndex(existing => {
                            let cleanExisting = (existing.sequence || '').replace(/\[.*?\]/g, '').toUpperCase().replace(/[^ACGTU]/g, '');
                            let existingScope = existing.scope || 'Global';
                            return existingScope === this.importTargetMode && cleanExisting === cleanNewSeq && cleanExisting.length > 0;
                        });
                    }
                    
                    if (existingIdx !== -1 && cleanNewSeq.length > 0) {
                        duplicates.push({ new: newItem, existingIdx: existingIdx });
                    } else {
                        novelItems.push(newItem);
                    }
                }
                
                let replacedCount = 0;
                let addedCount = novelItems.length;
                
                if (duplicates.length > 0) {
                    let replaceAll = confirm(`Found ${duplicates.length} items with sequences already existing in the ${this.importTargetMode} inventory.\n\nClick 'OK' to REPLACE existing items.\nClick 'Cancel' to ADD them as duplicates.`);
                    if (replaceAll) {
                        duplicates.forEach(dup => {
                            let existingItem = this.inventory[dup.existingIdx];
                            dup.new.id = existingItem.id;
                            this.inventory.splice(dup.existingIdx, 1, dup.new);
                            // Also update to cloud
                            this.saveItemToCloud(dup.new);
                            replacedCount++;
                        });
                    } else {
                        duplicates.forEach(dup => {
                            this.inventory.unshift(dup.new);
                            this.saveItemToCloud(dup.new);
                            addedCount++;
                        });
                    }
                }
                
                novelItems.forEach(item => {
                    this.inventory.unshift(item);
                    this.saveItemToCloud(item);
                });
                
                alert(`Successfully added ${addedCount} new items and replaced ${replacedCount} items into ${this.importTargetMode} inventory from ${sourceName}!`);
            },
            
            importInventory(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();

                if (file.name.toLowerCase().endsWith('.txt')) {
                    reader.onload = (e) => {
                        try {
                            const text = e.target.result;
                            const lines = text.split('\n');
                            let importedItems = [];
                            
                            for (let i = 0; i < lines.length; i++) {
                                let line = lines[i].trim();
                                line = line.replace(/\\s*/g, '');
                                if (!line || line.toLowerCase().startsWith('name') || line.toLowerCase().startsWith('sequence')) continue;
                                
                                let parts = line.split(/\t+|\s{2,}/);
                                
                                if (parts.length >= 3) {
                                    let name = parts[0];
                                    let seq = "";
                                    let massStr, concStr;
                                    
                                    const seqMatch = name.match(/^(.*?)\s+((?:\[[a-zA-Z0-9_'-]+\]|[ACGTU])+)$/i);
                                    if (seqMatch && parts.length < 5) {
                                        name = seqMatch[1].trim();
                                        seq = seqMatch[2].trim();
                                        massStr = parts[1];
                                        concStr = parts[parts.length - 1];
                                    } else {
                                        name = parts[0].trim();
                                        seq = parts[1] ? parts[1].trim() : "";
                                        massStr = parts[2];
                                        concStr = parts[parts.length - 1];
                                    }
                                    
                                    let conc = parseFloat(concStr);
                                    let mass = parseFloat(massStr);
                                    
                                    if (!name && !seq) continue;
                                    
                                    let formattedSeq = seq;
                                    if (formattedSeq && !formattedSeq.startsWith("5'")) {
                                        formattedSeq = `5'-${formattedSeq}-3'`;
                                    }
                                    
                                    let oligoType = seq.toUpperCase().includes('U') ? 'RNA' : 'DNA';
                                    let parsedLength = seq.replace(/\[.*?\]/g, '').replace(/[^a-zA-Z]/g, '').length;
                                    let parsedMw = !isNaN(mass) ? mass : null;
                                    
                                    importedItems.push({
                                        id: 'inv_txt_' + this.nextInvId++,
                                        code: 'TXT',
                                        cas: '',
                                        itemClass: 'DNA',
                                        name: name,
                                        stock: !isNaN(conc) ? conc : 100,
                                        stockUnit: 'µM',
                                        location: '',
                                        sequence: formattedSeq,
                                        length: parsedLength,
                                        gc: this.calculatedGcFallback(seq),
                                        tm: this.calcSeqTm(seq),
                                        mw: parsedMw !== null ? parsedMw : this.calcSeqMw(seq, oligoType),
                                        oligoType: oligoType,
                                        extinction: this.calcSeqExtinction(seq, oligoType),
                                        manualMw: parsedMw
                                    });
                                }
                            }
                            
                            this.processImports(importedItems, 'TXT');
                        } catch(err) {
                            console.error(err);
                            alert("Error parsing TXT file.");
                        }
                        event.target.value = '';
                    };
                    reader.readAsText(file);
                    return;
                }

                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        
                        let importedItems = [];

                        workbook.SheetNames.forEach(sheetName => {
                            if (!this.classOptions.includes(sheetName)) {
                                this.classOptions.push(sheetName);
                            }
                            const worksheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                            
                            if(rows.length < 2) return; 
                            
                            let headerRowIndex = -1;
                            for(let i = 0; i < Math.min(10, rows.length); i++) {
                                if(rows[i] && rows[i].some(cell => typeof cell === 'string' && (cell.trim().toLowerCase().includes('name') || cell.trim().toLowerCase() === 'identifier' || cell.trim().toLowerCase() === 'serial number'))) {
                                    headerRowIndex = i;
                                    break;
                                }
                            }
                            
                            if (headerRowIndex === -1) return;

                            const headers = rows[headerRowIndex].map(h => h ? h.toString().trim().toLowerCase() : '');
                            const dataRows = rows.slice(headerRowIndex + 1);

                            const getCol = (row, names) => {
                                for (let name of names) {
                                    let idx = headers.indexOf(name);
                                    if (idx !== -1 && row[idx] !== undefined && row[idx] !== null && row[idx] !== '') {
                                        return row[idx];
                                    }
                                }
                                return '';
                            };

                            dataRows.forEach(row => {
                                if(!row || row.length === 0) return;
                                
                                let name = getCol(row, ['item name *', 'name', 'item name']);
                                let code = getCol(row, ['serial number', 'identifier', 'number', 'code']);
                                let box = getCol(row, ['location', 'box']);
                                let subloc = getCol(row, ['sub-location', 'sublocation']);
                                let catalog = getCol(row, ['catalog #', 'catalog number', 'catalog num']);
                                let uSize = getCol(row, ['unit size', 'size']);
                                let casNum = getCol(row, ['cas number', 'cas # *', 'cas']);
                                let seq = getCol(row, ["sequence (5'->3')", 'sequence']);
                                let length = getCol(row, ['length [nt]', 'length']);
                                let mw = getCol(row, ['molecular weight', 'mw [g/mol]', 'mw']);
                                let gc = getCol(row, ['gc content', 'gc']);
                                if (typeof gc === 'string') gc = gc.replace('%','').replace(',','.');
                                let dnaType = getCol(row, ['dna type', 'type']);
                                let concStr = getCol(row, ['amount in stock', 'dilution', 'stock conc.', 'stock']);
                                let concUnitQuartzy = getCol(row, ['amount in stock units']);
                                
                                if (!name && !code && !seq) return; 
                                if (!name && code) name = code; 
                                
                                let stock = 100;
                                let unit = 'µM';
                                if (concStr) {
                                    let s = concStr.toString().trim();
                                    const numMatch = s.match(/^[\d\.,]+/);
                                    if (numMatch) {
                                        stock = parseFloat(numMatch[0].replace(',', '.'));
                                        let u = s.substring(numMatch[0].length).trim();
                                        if (u) unit = u;
                                    } else {
                                        stock = parseFloat(s) || 100;
                                    }
                                }
                                if (concUnitQuartzy) {
                                    unit = concUnitQuartzy.toString().trim();
                                }

                                let isRna = dnaType && typeof dnaType === 'string' && dnaType.toUpperCase().includes('RNA');
                                let itemClass = sheetName;
                                let oligoType = isRna ? 'RNA' : 'DNA';

                                let parsedMw = mw ? parseFloat(mw.toString().replace(',','.')) : null;
                                if (isNaN(parsedMw)) parsedMw = null;
                                
                                let rawSeq = seq ? seq.toString().trim() : '';
                                let formattedSeq = rawSeq;
                                if (formattedSeq && !formattedSeq.startsWith("5'")) {
                                    formattedSeq = `5'-${formattedSeq}-3'`;
                                }

                                let parsedLength = length ? parseFloat(length) : (rawSeq ? rawSeq.replace(/\[.*?\]/g, '').replace(/[^a-zA-Z]/g, '').length : 0);
                                let parsedGc = gc ? parseFloat(gc) : (rawSeq ? this.calculatedGcFallback(rawSeq) : 0);
                                
                                let calcExt = rawSeq ? this.calcSeqExtinction(rawSeq, oligoType) : 0;
                                let calcMw = rawSeq ? this.calcSeqMw(rawSeq, oligoType) : 0;

                                importedItems.push({
                                    id: 'inv_imp_' + this.nextInvId++,
                                    code: code || 'IMP',
                                    cas: casNum || '',
                                    itemClass: itemClass,
                                    name: name || 'Unnamed',
                                    stock: stock,
                                    stockUnit: unit,
                                    location: box ? box.toString() : '',
                                    sublocation: subloc || '',
                                    catalogNum: catalog || '',
                                    unitSize: uSize || '',
                                    sequence: formattedSeq,
                                    length: parsedLength,
                                    gc: parsedGc,
                                    tm: this.calcSeqTm(rawSeq),
                                    mw: parsedMw !== null ? parsedMw : calcMw,
                                    oligoType: oligoType,
                                    extinction: calcExt,
                                    manualMw: parsedMw
                                });
                            });
                        });
                        
                        this.processImports(importedItems, 'Excel');
                    } catch(err) {
                        console.error(err);
                        alert("Error importing file. Please ensure it is a valid Excel/CSV file.");
                    }
                    event.target.value = ''; 
                };
                reader.readAsArrayBuffer(file);
            },
            
            saveDnaToInventory() {

                const newItem = {

                };

                };

            addReaction() { this.reactions.unshift({ id: this.nextReactionId++, name: 'New Protocol', targetVolume: 30, targetVolumeUnit: 'µL', items: [], targetPlateId: '', targetWell: '' }); },
            removeReaction(index) { this.reactions.splice(index, 1); },
            addItem(reaction) { reaction.items.push({ invId: '', searchQuery: '', searchScope: 'Global', target: 1, targetUnit: 'µM', isFixed: false, fixedVol: 1, fixedVolUnit: 'µL', labware: '' }); },
            removeItem(reaction, itemIndex) { reaction.items.splice(itemIndex, 1); },
            calc1xVol(reaction, item) {
                if (item.isFixed) {
                    const fVolBase = this.getUM(Number(item.fixedVol), item.fixedVolUnit || 'µL');
                    const rVolBase = this.getUM(1, reaction.targetVolumeUnit || 'µL');
                    return rVolBase ? fVolBase / rVolBase : 0;
                }
                if (!item.invId) return 0;
                const invItem = this.inventory.find(i => i.id === item.invId);
                if (!invItem || !invItem.stock) return 0;
                
                const targetConcBase = this.getUM(Number(item.target), item.targetUnit || 'µM');
                const stockConcBase = this.getUM(Number(invItem.stock), invItem.stockUnit || 'µM');
                
                if (stockConcBase === 0) return 0;
                return (targetConcBase * reaction.targetVolume) / stockConcBase;
            },
            calcMMVol(reaction, item) { return this.calc1xVol(reaction, item) * this.globalSettings.mmReactions; },
            reactionTotalVol(reaction) { return reaction.items.reduce((sum, item) => sum + this.calc1xVol(reaction, item), 0); },

            saveReactionToWell(reaction) {
                if (!reaction.targetPlateId || !reaction.targetWell) { alert("Please select a target plate and well."); return; }
                const plate = this.wellPlates.find(p => p.id === reaction.targetPlateId);
                if (!plate) return;
                
                const wId = reaction.targetWell.toUpperCase().trim();
                const unit = reaction.targetVolumeUnit || 'µL';
                
                let html = `<strong style="color: var(--primary);">${reaction.name || 'Protocol'}</strong><br>`;
                reaction.items.forEach(item => {
                    const invItem = this.inventory.find(i => i.id === item.invId);
                    if (invItem) {
                        const vol1x = this.calc1xVol(reaction, item);
                        const targetText = item.isFixed ? '(Fixed)' : `(${item.target} ${item.targetUnit || 'µM'}/X)`;
                        html += `&nbsp;<span class="inv-ref" contenteditable="false" data-labware="${item.labware || ''}"><i class="fas fa-tag"></i>&nbsp;[${invItem.code}] ${invItem.name} (${this.formatNum(invItem.stock)} ${invItem.stockUnit || 'µM'})&nbsp;<i class="fas fa-times" style="cursor:pointer; margin-left:4px; opacity: 0.7;" onclick="let ce = this.closest('[contenteditable]'); this.parentElement.remove(); if(ce) ce.dispatchEvent(new Event('input', {bubbles: true}));" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"></i></span>&nbsp; ${this.formatNum(vol1x)} ${unit} ${targetText}<br>`;
                    }
                });
                const h2o1x = Math.max(0, reaction.targetVolume - this.reactionTotalVol(reaction));
                html += `<strong>MQ H₂O:</strong> ${this.formatNum(h2o1x)} ${unit}`;
                
                plate.wells[wId] = html;
                alert(`Successfully sent ${reaction.name || 'Protocol'} to Plate: ${plate.name}, Well: ${wId}`);
            },

            addMatrix() { 
                this.matrices.unshift({ 
                    id: this.nextMatrixId++, name: 'New Matrix Grid', targetVolume: 30, targetVolumeUnit: 'µL', rowTargetConc: 2.8, rowTargetConcUnit: 'µM', colTargetConc: 1.4, colTargetConcUnit: 'µM', 
                    customBlocks: [], 
                    fixedAdditives: [{name: 'Ligase buffer (10x)', vol: 3, searchQuery: '', searchScope: 'Global', labware: ''}, {name: 'T4 DNA Ligase', vol: 2, searchQuery: '', searchScope: 'Global', labware: ''}],
                    selectedRows: [], selectedCols: [], targetPlateId: '', targetStartWell: ''
                }); 
            },
            removeMatrix(index) { this.matrices.splice(index, 1); },
            addBlockToMatrix(matrix) { matrix.customBlocks.push({ id: 'blk_' + this.nextBlockId++, name: 'New Block', itemIds: [], searchQuery: '', searchScope: 'Global', labware: '' }); },
            addFixedAdditive(matrix) {
                if(!matrix.fixedAdditives) matrix.fixedAdditives = [];
                matrix.fixedAdditives.push({ name: 'New Component', vol: 1, searchQuery: '', searchScope: 'Global', labware: '' });
            },
            getBlockName(matrix, blockId) {
                const block = matrix.customBlocks.find(b => b.id === blockId);
                return block ? block.name : 'Unknown Block';
            },
            getUM(val, unit) {
                if (!val) return 0;
                let m = 1;
                if (unit === 'M') m = 1e6;
                else if (unit === 'mM') m = 1e3;
                else if (unit === 'µM') m = 1;
                else if (unit === 'nM') m = 1e-3;
                else if (unit === 'mg/mL' || unit === 'µg/µL') m = 1;
                else if (unit === 'ng/µL') m = 1e-3;
                else if (unit === 'X') m = 1;
                else if (unit === 'U/µL') m = 1;
                else if (unit === '%') m = 1;
                else if (unit === 'L') m = 1e6;
                else if (unit === 'mL') m = 1e3;
                else if (unit === 'µL') m = 1;
                else if (unit === 'nL') m = 1e-3;
                return val * m;
            },
            calculateMatrixCell(matrix, rowBlockId, colBlockId) {
                const rowBlock = matrix.customBlocks.find(b => b.id === rowBlockId);
                const colBlock = matrix.customBlocks.find(b => b.id === colBlockId);
                const tv = matrix.targetVolume;
                const unit = matrix.targetVolumeUnit || 'µL';

                if (!rowBlock || !colBlock) return "Error";
                
                let htmlStr = "";
                let totalVol = 0;

                const rowTargetUM = this.getUM(matrix.rowTargetConc, matrix.rowTargetConcUnit || 'µM');
                const colTargetUM = this.getUM(matrix.colTargetConc, matrix.colTargetConcUnit || 'µM');

                rowBlock.itemIds.forEach(itemId => {
                    const item = this.inventory.find(i => i.id === itemId);
                    if(item) {
                        const stockUM = this.getUM(item.stock, item.stockUnit || 'µM');
                        let v = stockUM ? (rowTargetUM * tv) / stockUM : 0;
                        totalVol += v;
                        htmlStr += `<strong>Row:</strong> &nbsp;<span class="inv-ref" contenteditable="false" data-labware="${rowBlock.labware || ''}"><i class="fas fa-tag"></i>&nbsp;[${item.code}] ${item.name} (${this.formatNum(item.stock)} ${item.stockUnit || 'µM'})&nbsp;<i class="fas fa-times" style="cursor:pointer; margin-left:4px; opacity: 0.7;" onclick="let ce = this.closest('[contenteditable]'); this.parentElement.remove(); if(ce) ce.dispatchEvent(new Event('input', {bubbles: true}));" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"></i></span>&nbsp; ${this.formatNum(v)} ${unit} (${matrix.rowTargetConc} ${matrix.rowTargetConcUnit || 'µM'})<br>`;
                    }
                });
                
                colBlock.itemIds.forEach(itemId => {
                    const item = this.inventory.find(i => i.id === itemId);
                    if(item) {
                        const stockUM = this.getUM(item.stock, item.stockUnit || 'µM');
                        let v = stockUM ? (colTargetUM * tv) / stockUM : 0;
                        totalVol += v;
                        htmlStr += `<strong>Col:</strong> &nbsp;<span class="inv-ref" contenteditable="false" data-labware="${colBlock.labware || ''}"><i class="fas fa-tag"></i>&nbsp;[${item.code}] ${item.name} (${this.formatNum(item.stock)} ${item.stockUnit || 'µM'})&nbsp;<i class="fas fa-times" style="cursor:pointer; margin-left:4px; opacity: 0.7;" onclick="let ce = this.closest('[contenteditable]'); this.parentElement.remove(); if(ce) ce.dispatchEvent(new Event('input', {bubbles: true}));" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"></i></span>&nbsp; ${this.formatNum(v)} ${unit} (${matrix.colTargetConc} ${matrix.colTargetConcUnit || 'µM'})<br>`;
                    }
                });
                
                let fixedVolTotal = 0;
                let fixedHtml = "";
                if(matrix.fixedAdditives) {
                    matrix.fixedAdditives.forEach(add => {
                        let vol = Number(add.vol) || 0;
                        fixedVolTotal += vol;
                        fixedHtml += `&nbsp;<span class="inv-ref" contenteditable="false" data-labware="${add.labware || ''}" style="background-color: #6b7280;"><i class="fas fa-flask"></i>&nbsp;${add.name}&nbsp;<i class="fas fa-times" style="cursor:pointer; margin-left:4px; opacity: 0.7;" onclick="let ce = this.closest('[contenteditable]'); this.parentElement.remove(); if(ce) ce.dispatchEvent(new Event('input', {bubbles: true}));" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"></i></span>&nbsp; ${this.formatNum(vol)} ${unit}<br>`;
                    });
                }
                
                totalVol += fixedVolTotal;
                const h2o = tv - totalVol;

                if (h2o < 0) return `<span class="error"><i class="fas fa-triangle-exclamation"></i> Exceeds Vol (${this.formatNum(totalVol)}${unit})</span><br>${htmlStr}`;

                htmlStr += fixedHtml;
                htmlStr += `
                    <div style="margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px;">
                        <strong>MQ H₂O:</strong> <span style="color: var(--primary); font-weight: bold;">${this.formatNum(h2o)} ${unit}</span>
                    </div>
                `;
                return htmlStr;
            },

            saveMatrixToPlate(matrix) {
                if (!matrix.targetPlateId || !matrix.targetStartWell) { alert("Please select a target plate and starting well."); return; }
                const plate = this.wellPlates.find(p => p.id === matrix.targetPlateId);
                if (!plate) return;
                
                const startWell = matrix.targetStartWell.toUpperCase().trim();
                const match = startWell.match(/^([A-Z]+)(\d+)$/);
                if (!match) { alert("Invalid well format. Use A1, B2, etc."); return; }
                
                let startRow = match[1].charCodeAt(0) - 65; 
                let startCol = parseInt(match[2]) - 1;
                
                matrix.selectedRows.forEach((rowBlockId, rIdx) => {
                    matrix.selectedCols.forEach((colBlockId, cIdx) => {
                        let targetR = startRow + rIdx;
                        let targetC = startCol + cIdx;
                        
                        if (targetR < this.getPlateRows(plate.format) && targetC < this.getPlateCols(plate.format)) {
                            let wId = this.getWellId(targetR, targetC);
                            let cellHtml = this.calculateMatrixCell(matrix, rowBlockId, colBlockId);
                            plate.wells[wId] = cellHtml;
                        }
                    });
                });
                alert(`Successfully sent matrix to Plate: ${plate.name} starting at ${startWell}`);
            },
            
            saveReactionToJournal(reaction) {
                if (!this.activeJournalEntry) { alert("Please select an active journal entry first."); return; }
                
                const unit = reaction.targetVolumeUnit || 'µL';
                let html = `<br><br><div style="border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); background: var(--surface);">`;
                html += `<h3 style="margin-top: 0; color: var(--primary);"><i class="fas fa-flask"></i> Protocol: ${reaction.name || 'Untitled'}</h3>`;
                html += `<div class="table-responsive"><table style="width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: left; border: 1px solid var(--border);">`;
                html += `<thead><tr><th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px;">Component</th><th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px;">Target</th><th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px;">1x Vol (${unit})</th><th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px;">MM Vol (${unit})</th></tr></thead><tbody>`;
                
                let total1x = 0;
                reaction.items.forEach(item => {
                    const invItem = this.inventory.find(i => i.id === item.invId);
                    const nameTag = invItem ? `&nbsp;<span class="inv-ref" contenteditable="false"><i class="fas fa-tag"></i>&nbsp;[${invItem.code}] ${invItem.name} (${this.formatNum(invItem.stock)} ${invItem.stockUnit || 'µM'})&nbsp;<i class="fas fa-times" style="cursor:pointer; margin-left:4px; opacity: 0.7;" onclick="let ce = this.closest('[contenteditable]'); this.parentElement.remove(); if(ce) ce.dispatchEvent(new Event('input', {bubbles: true}));" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"></i></span>&nbsp;` : 'Unknown';
                    const target = item.isFixed ? 'Fixed' : `${item.target} ${item.targetUnit || 'µM'}`;
                    const vol1x = this.calc1xVol(reaction, item);
                    const volMM = this.calcMMVol(reaction, item);
                    total1x += vol1x;
                    
                    html += `<tr><td style="border: 1px solid var(--border); padding: 8px;">${nameTag}</td><td style="border: 1px solid var(--border); padding: 8px;">${target}</td><td style="border: 1px solid var(--border); padding: 8px;">${this.formatNum(vol1x)}</td><td style="border: 1px solid var(--border); padding: 8px;">${this.formatNum(volMM)}</td></tr>`;
                });
                
                const h2o1x = Math.max(0, reaction.targetVolume - total1x);
                const h2oMM = h2o1x * this.globalSettings.mmReactions;
                
                html += `<tr><td style="border: 1px solid var(--border); padding: 8px;"><strong>MQ Water</strong></td><td style="border: 1px solid var(--border); padding: 8px;">-</td><td style="border: 1px solid var(--border); padding: 8px;">${this.formatNum(h2o1x)}</td><td style="border: 1px solid var(--border); padding: 8px;">${this.formatNum(h2oMM)}</td></tr>`;
                html += `<tr style="background-color: var(--summary-bg); font-weight: bold;"><td style="border: 1px solid var(--border); padding: 8px;">TOTAL</td><td style="border: 1px solid var(--border); padding: 8px;">-</td><td style="border: 1px solid var(--border); padding: 8px;">${this.formatNum(reaction.targetVolume)}</td><td style="border: 1px solid var(--border); padding: 8px;">${this.formatNum(reaction.targetVolume * this.globalSettings.mmReactions)}</td></tr>`;
                
                html += `</tbody></table></div></div><br>`;
                
                this.activeJournalEntry.content += html;
                this.syncEditor();
            },
            
            saveMatrixToJournal(matrix) {
                if (!this.activeJournalEntry) { alert("Please select an active journal entry first."); return; }
                
                const unit = matrix.targetVolumeUnit || 'µL';
                let html = `<br><br><div style="border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); background: var(--surface);">`;
                html += `<h3 style="margin-top: 0; color: var(--primary);"><i class="fas fa-table-cells"></i> Matrix Grid: ${matrix.name || 'Untitled'}</h3>`;
                html += `<p style="font-size: 0.85rem; margin-bottom: 10px;">Row Target: ${matrix.rowTargetConc} ${matrix.rowTargetConcUnit || 'µM'} | Col Target: ${matrix.colTargetConc} ${matrix.colTargetConcUnit || 'µM'}</p>`;
                
                let fixedText = [];
                if(matrix.fixedAdditives && matrix.fixedAdditives.length > 0) {
                    matrix.fixedAdditives.forEach(add => {
                        let vol = Number(add.vol) || 0;
                        fixedText.push(`&nbsp;<span class="inv-ref" contenteditable="false" style="background-color: #6b7280;"><i class="fas fa-flask"></i>&nbsp;${add.name}&nbsp;<i class="fas fa-times" style="cursor:pointer; margin-left:4px; opacity: 0.7;" onclick="let ce = this.closest('[contenteditable]'); this.parentElement.remove(); if(ce) ce.dispatchEvent(new Event('input', {bubbles: true}));" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"></i></span>&nbsp; (${this.formatNum(vol)} ${unit})`);
                    });
                    html += `<p style="font-size: 0.85rem; margin-bottom: 15px;"><strong>Fixed Additives:</strong> ${fixedText.join(', ')}</p>`;
                }

                if (matrix.selectedRows.length > 0 && matrix.selectedCols.length > 0) {
                    html += `<div class="table-responsive"><table style="width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: left; border: 1px solid var(--border);">`;
                    html += `<thead><tr><th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px;"></th>`;
                    matrix.selectedCols.forEach(colId => {
                        html += `<th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px; text-align: center;">${this.getBlockName(matrix, colId)} (Col)</th>`;
                    });
                    html += `</tr></thead><tbody>`;
                    
                    matrix.selectedRows.forEach(rowId => {
                        html += `<tr><th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 8px; text-align: center;">${this.getBlockName(matrix, rowId)} (Row)</th>`;
                        matrix.selectedCols.forEach(colId => {
                            let cellHtml = this.calculateMatrixCell(matrix, rowId, colId);
                            html += `<td style="border: 1px solid var(--border); padding: 8px; vertical-align: top;">${cellHtml}</td>`;
                        });
                        html += `</tr>`;
                    });
                    html += `</tbody></table></div>`;
                } else {
                    html += `<p style="opacity: 0.7; font-style: italic; margin-top: 10px;">Matrix is empty (select row and column blocks).</p>`;
                }
                html += `</div><br>`;
                
                this.activeJournalEntry.content += html;
                this.syncEditor();
            },

            // --- Well Plate Methods ---
            addWellPlate() {
                this.wellPlates.unshift({ id: this.nextPlateId++, name: 'New Plate', format: 96, selectedWell: null, targetLabware: '201812181400', wells: {} });
            },
            removeWellPlate(index) {
                this.wellPlates.splice(index, 1);
            },
            getPlateRows(format) { 
                if (format === 'ibidi') return 3;
                if (format === 'pcr8') return 1;
                return format === 384 ? 16 : (format === 48 ? 6 : (format === 24 ? 4 : 8)); 
            },
            getPlateCols(format) { 
                if (format === 'ibidi') return 6;
                if (format === 'pcr8') return 8;
                return format === 384 ? 24 : (format === 48 ? 8 : (format === 24 ? 6 : 12)); 
            },
            getWellId(r, c) { return String.fromCharCode(65 + r) + (c + 1); },
            selectWell(plate, wellId) {
                plate.selectedWell = wellId;
                this.$nextTick(() => {
                    const editor = document.getElementById('wellEditor_' + plate.id);
                    if (editor) {
                        editor.innerHTML = plate.wells[wellId] || '';
                    }
                });
            },
            updateWellContent(plate, event) {
                if (!plate.selectedWell) return;
                plate.wells[plate.selectedWell] = event.target.innerHTML;
            },
            formatWellDoc(plate, cmd, value = null) {
                const editor = document.getElementById('wellEditor_' + plate.id);
                if (editor) editor.focus();
                document.execCommand(cmd, false, value);
                this.updateWellContent(plate, { target: editor });
            },
            insertInventoryRefToWell(plate) {
                if (!this.selectedWellInvRef || !plate.selectedWell) return;
                const item = this.inventory.find(i => i.id === this.selectedWellInvRef);
                const editor = document.getElementById('wellEditor_' + plate.id);
                if (item && editor) {
                    editor.focus();
                    const html = `&nbsp;<span class="inv-ref" contenteditable="false" data-labware=""><i class="fas fa-tag"></i>&nbsp;[${item.code}] ${item.name} (${this.formatNum(item.stock)} ${item.stockUnit || 'µM'})&nbsp;<i class="fas fa-times" style="cursor:pointer; margin-left:4px; opacity: 0.7;" onclick="let ce = this.closest('[contenteditable]'); this.parentElement.remove(); if(ce) ce.dispatchEvent(new Event('input', {bubbles: true}));" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7"></i></span>&nbsp;`;
                    document.execCommand('insertHTML', false, html);
                    plate.wells[plate.selectedWell] = editor.innerHTML;
                }
                this.selectedWellInvRef = '';
            },
            savePlateToJournal(plate) {
                if (!this.activeJournalEntry) { alert("Please select an active journal entry first."); return; }
                
                let html = `<br><br><div style="border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); background: var(--surface);">`;
                html += `<h3 style="margin-top: 0; color: var(--primary);"><i class="fas fa-border-all"></i> Plate Map: ${plate.name} (${plate.format}-Well)</h3>`;
                html += `<div class="table-responsive"><table style="width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: left; border: 1px solid var(--border);">`;
                
                const rows = this.getPlateRows(plate.format);
                const cols = this.getPlateCols(plate.format);
                
                html += `<tr><th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 4px; text-align: center;"></th>`;
                for (let c = 0; c < cols; c++) {
                    html += `<th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 4px; text-align: center; min-width: 80px;">${c + 1}</th>`;
                }
                html += `</tr>`;
                
                let filledWells = 0;
                for (let r = 0; r < rows; r++) {
                    const rowLabel = String.fromCharCode(65 + r);
                    html += `<tr><th style="border: 1px solid var(--border); background: var(--summary-bg); padding: 4px; text-align: center;">${rowLabel}</th>`;
                    for (let c = 0; c < cols; c++) {
                        const wId = this.getWellId(r, c);
                        const content = plate.wells[wId];
                        if (content && content.trim() !== '') filledWells++;
                        html += `<td style="border: 1px solid var(--border); padding: 4px; vertical-align: top;">${content || ''}</td>`;
                    }
                    html += `</tr>`;
                }
                html += `</table></div>`;
                
                if (filledWells === 0) {
                    html += `<p style="opacity: 0.7; font-style: italic; margin-top: 10px;">Plate is completely empty.</p>`;
                }
                html += `</div><br>`;
                
                this.activeJournalEntry.content += html;
                this.syncEditor();
            }
        }
    }).mount('#app');
</script>
</body>
</html>
