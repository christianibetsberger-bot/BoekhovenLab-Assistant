<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background: diagonal gradient dark-blue -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a5296"/>
      <stop offset="100%" stop-color="#082d58"/>
    </linearGradient>
    <!-- Gloss: white fade from top (squircle sheen) -->
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.25"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Droplet radial gradient — bright upper-left highlight, transparent body/edge -->
    <!-- objectBoundingBox (default): percentages are relative to each circle's own bounds -->
    <radialGradient id="dm" cx="34%" cy="30%" r="64%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.92"/>
      <stop offset="36%"  stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.07"/>
    </radialGradient>
    <radialGradient id="ds" cx="33%" cy="27%" r="67%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.88"/>
      <stop offset="30%"  stop-color="white" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </radialGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect width="512" height="512" rx="114" fill="url(#gl)"/>

  <!-- Coacervate droplet cluster — largest first (painter's order) -->
  <!-- Main large droplet -->
  <circle cx="210" cy="238" r="118"
    fill="url(#dm)" stroke="white" stroke-width="6.5" stroke-opacity="0.72"/>
  <!-- Second large droplet — overlaps main, suggests coalescence -->
  <circle cx="322" cy="298" r="76"
    fill="url(#dm)" stroke="white" stroke-width="5.5" stroke-opacity="0.65"/>
  <!-- Medium satellite upper-right -->
  <circle cx="390" cy="155" r="50"
    fill="url(#ds)" stroke="white" stroke-width="4.5" stroke-opacity="0.60"/>
  <!-- Medium satellite lower-left -->
  <circle cx="128" cy="372" r="36"
    fill="url(#ds)" stroke="white" stroke-width="4.0" stroke-opacity="0.55"/>
  <!-- Small satellite right -->
  <circle cx="416" cy="276" r="22"
    fill="url(#ds)" stroke="white" stroke-width="3.0" stroke-opacity="0.50"/>
  <!-- Micro droplets — suggest nucleation in surrounding phase -->
  <circle cx="105" cy="190" r="15"
    fill="url(#ds)" stroke="white" stroke-width="2.5" stroke-opacity="0.45"/>
  <circle cx="422" cy="394" r="11"
    fill="url(#ds)" stroke="white" stroke-width="2.0" stroke-opacity="0.40"/>
  <circle cx="170" cy="462" r="8"
    fill="url(#ds)" stroke="white" stroke-width="1.5" stroke-opacity="0.35"/>
</svg>
